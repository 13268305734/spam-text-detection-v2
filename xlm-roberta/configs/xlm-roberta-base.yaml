model:
  name: "xlm-roberta-base" 
  num_labels: 2
  id2label:
    0: "ham"
    1: "spam"

training:
  eval_strategy: "epoch"
  save_strategy: "epoch"
  learning_rate: 0.00002
  per_device_train_batch_size: 256 # decrease according to your GPU memory 
  per_device_eval_batch_size: 256
  num_train_epochs: 50
  weight_decay: 0.01
  logging_strategy: "steps" 
  logging_steps: 50
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  seed: 42
  report_to: "tensorboard"  

tokenizer:
  max_length: 128